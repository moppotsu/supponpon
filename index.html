*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fff;color:#111;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 80px}

.top-banner{width:100%;max-width:480px}
.top-banner img{width:100%;display:block}

.name{font-size:20px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px;text-align:center;margin-top:8px}
.bio{font-size:13px;color:#888;text-align:center;margin-bottom:28px;max-width:320px;line-height:1.7}

.links{width:100%;max-width:480px;display:flex;flex-direction:column;gap:10px}

.btn{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:6px;
  text-decoration:none;font-size:14px;font-weight:600;
  border:1.5px solid #ddd;color:#111;background:#fff;
  transition:background .15s,border-color .15s;
}
.btn:hover{background:#fafafa;border-color:#bbb}
.btn.disabled{opacity:.35;pointer-events:none}

.btn-left{display:flex;align-items:center;gap:12px}
.btn-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-icon img{width:34px;height:34px;object-fit:contain}
.btn-label{font-size:14px;font-weight:600}
.btn-sub{font-size:11px;font-weight:400;opacity:.65;margin-top:1px}
.arrow{color:#ccc;font-size:18px;line-height:1}

.divider{width:100%;max-width:480px;border:none;border-top:1px solid #eee;margin:4px 0}
.footer{margin-top:40px;font-size:11px;color:#ccc;text-align:center}
.footer a{color:#ff4d8d;text-decoration:none}
</style>
